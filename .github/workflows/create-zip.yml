name: Auto Version (Int), Manifest Update and Release

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. Generar versión entera y actualizar manifest.php
      - name: Bump manifest.php version and date
        id: bump_manifest
        run: |
          # 1. Generar nueva versión (Entero basado en Timestamp)
          # Esto garantiza un número de 10 cifras que siempre crece
          NEW_VERSION=$(date +%s)
          
          # 2. Generar nueva fecha de publicación (YYYY-MM-DD HH:MM:SS)
          NEW_DATE=$(date +"%Y-%m-%d %H:%M:%S")
          
          echo "Nueva versión (Int): $NEW_VERSION"
          echo "Nueva fecha: $NEW_DATE"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # 3. Reemplazar versión y fecha en el manifest.php usando regex
          # Buscamos la clave 'version' y la clave 'published_date'
          sed -i "s/'version'\s*=>\s*'[0-9.]*'/'version' => '$NEW_VERSION'/g" manifest.php
          sed -i "s/'published_date'\s*=>\s*'[^']*'/'published_date' => '$NEW_DATE'/g" manifest.php
          
          # 4. Configurar git y hacer commit de los cambios
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add manifest.php
          git commit -m "chore: bump manifest version to $NEW_VERSION and date [skip ci]"
          git push

      # 2. Crear el Tag de Git
      - name: Create Git Tag
        id: create_tag
        run: |
          TAG_NAME="v${{ steps.bump_manifest.outputs.new_version }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      # 3. Empaquetar el módulo
      - name: Create Zip
        run: zip -r stic_ClubsSocials.zip . -x "*.git*" ".github*"

      # 4. Crear el Release en GitHub
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.tag_name }}
          name: Release ${{ steps.create_tag.outputs.tag_name }}
          files: stic_ClubsSocials.zip
          body: |
            Automatized Release: ${{ steps.create_tag.outputs.tag_name }}
            - Version updated to integer: ${{ steps.bump_manifest.outputs.new_version }}
            - Published date updated to: ${{ steps.bump_manifest.outputs.new_date }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
