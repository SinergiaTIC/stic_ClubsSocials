name: Auto Version, Manifest Update and Release

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. Calcular versiones y actualizar manifest.php
      - name: Bump manifest.php version and date
        id: bump_manifest
        run: |
          # --- LÓGICA PARA EL MANIFEST (SinergiaCRM) ---
          NEW_INT_VERSION=$(date +%s)
          NEW_DATE=$(date +"%Y-%m-%d %H:%M:%S")
          
          # --- LÓGICA PARA GITHUB (SemVer Dinámico) ---
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION_ONLY=${LAST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION_ONLY"
          
          # Obtener el mensaje del último commit
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if [[ "$COMMIT_MSG" == *"[major]"* ]]; then
            NEW_MAJOR=$((major + 1))
            NEW_MINOR=0
            NEW_PATCH=0
            echo "Incremento detectado: MAJOR"
          elif [[ "$COMMIT_MSG" == *"[minor]"* ]]; then
            NEW_MAJOR=$major
            NEW_MINOR=$((minor + 1))
            NEW_PATCH=0
            echo "Incremento detectado: MINOR"
          else
            NEW_MAJOR=$major
            NEW_MINOR=$minor
            NEW_PATCH=$((patch + 1))
            echo "Incremento detectado: PATCH (por defecto)"
          fi
          
          GIT_SEMVER="$NEW_MAJOR.$NEW_MINOR.$NEW_PATCH"
          
          echo "Sinergia Version: $NEW_INT_VERSION"
          echo "GitHub Release: $GIT_SEMVER"
          echo "int_version=$NEW_INT_VERSION" >> $GITHUB_OUTPUT
          echo "semver=v$GIT_SEMVER" >> $GITHUB_OUTPUT

          # 2. Actualizar el manifest.php
          sed -i "s/'version'\s*=>\s*'[^']*'/'version' => '$NEW_INT_VERSION'/g" manifest.php
          sed -i "s/'published_date'\s*=>\s*'[^']*'/'published_date' => '$NEW_DATE'/g" manifest.php
          
          # 3. Commit del cambio en el manifest
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add manifest.php
          git commit -m "chore: update manifest to $NEW_INT_VERSION [skip ci]"
          git pull --rebase origin main
          git push

      # 2. Crear el Tag de Git
      - name: Create Git Tag
        run: |
          TAG_NAME="${{ steps.bump_manifest.outputs.semver }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME

      # 3. Empaquetar y Release
      - name: Create Zip
        run: zip -r stic_ClubsSocials.zip . -x "*.git*" ".github*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_manifest.outputs.semver }}
          name: Release ${{ steps.bump_manifest.outputs.semver }}
          files: stic_ClubsSocials.zip
          body: |
            ## Release ${{ steps.bump_manifest.outputs.semver }}
            - **Internal Build ID (Sinergia):** ${{ steps.bump_manifest.outputs.int_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
